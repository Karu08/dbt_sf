version: 2

sources:

  # Forex data (Marketplace)
  - name: forex_data
    database: SNOWFLAKE_PUBLIC_DATA_FOREIGN_EXCHANGE_RATES
    schema: PUBLIC_DATA
    tables:
      - name: FX_RATES_TIMESERIES
        description: "Foreign exchange rates time series data"
        columns:
          - name: RUN_DATE
            description: "Date of the FX rate"
            tests:
              - not_null
          - name: CURRENCY_PAIR_NAME
            description: "Currency pair (e.g., EUR/USD)"
            tests:
              - not_null
          - name: OPEN
            description: "Opening rate"
          - name: HIGH
            description: "Highest rate"
          - name: LOW
            description: "Lowest rate"
          - name: CLOSE
            description: "Closing rate"

  # Trading book data
  - name: trading_data
    database: SNOWFLAKE_LEARNING_DB
    schema: RUD_SCHEMA
    tables:
      - name: TRADING_BOOKS      # exact table name
        description: "Trading book data"
        columns:
          - name: TRADE_ID
            description: "Unique identifier for the trade"
            tests:
              - unique
              - not_null
          - name: TRADE_DATE
            description: "Date of the trade"
            tests:
              - not_null
          - name: TRADER_NAME
            description: "Name of the trader"
          - name: DESK
            description: "Trading desk name"
          - name: TICKER
            description: "Traded instrument"
          - name: QUANTITY
            description: "Trade quantity"
          - name: PRICE
            description: "Trade price"
          - name: TRADE_TYPE
            description: "Type of trade (BUY/SELL)"
          - name: NOTES
            description: "Trade notes and comments"

  # Portfolio weights data
  - name: portfolio_data
    database: SNOWFLAKE_LEARNING_DB
    schema: RUD_SCHEMA
    tables:
      - name: WEIGHTS_TABLE       # exact table name
        description: "Portfolio target allocations by region and desk"
        columns:
          - name: REGION
            description: "Geographic region"
            tests:
              - not_null
          - name: DESK
            description: "Trading desk name"
            tests:
              - not_null
          - name: TARGET_ALLOCATION
            description: "Target portfolio allocation"
            tests:
              - not_null